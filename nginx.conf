server {
    listen 80;
    server_name painel.ciklogeradores.com.br;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name painel.ciklogeradores.com.br;

    ssl_certificate     /etc/letsencrypt/live/painel.ciklogeradores.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/painel.ciklogeradores.com.br/privkey.pem;

    # Ajusta pro build do frontend
    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /socket.io/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Hashed build assets (index-<hash>.js/css) — the filename changes on every
    # build, so they can be cached hard and forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached: it's what points at the current hashed
    # bundle. A stale index.html keeps clients loading an old bundle even after
    # a deploy (this is why a phone could keep showing an outdated UI while a
    # freshly-loaded desktop browser showed the new one).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri /index.html;
    }
}
