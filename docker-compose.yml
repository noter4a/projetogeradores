version: '3.8'

services:
  app:
    image: projetogeradores_app
    build: .
    container_name: ciklo-geradores
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

  api:
    build: 
      context: ./server
    container_name: ciklo-api
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - DB_HOST=database
      - NODE_ENV=production
    ports:
      - "127.0.0.1:5000:5000"
      # TCP<->MQTT bridge for serial-over-TCP modems (USR-G806s etc.).
      # Exposed on all interfaces so 4G modems can reach it. Must match TCP_BRIDGE_PORT in server/.env.
      - "8900:8900"
      # GNSS location reports from the modem (separate socket). Must match GNSS_BRIDGE_PORT in server/.env.
      - "8901:8901"
      # SNMP agent (generator telemetry, read-only). Must match SNMP_PORT in server/.env.
      # Restrict via firewall to the monitoring system's IP — never leave this open to the internet.
      - "161:161/udp"
      # Per-client scoped SNMP exports (SNMP_CLIENT_EXPORT_<N>_PORT in server/.env).
      # Reserved range so adding a new export only needs .env + container recreate —
      # no compose edit needed as long as the chosen port falls in this range.
      - "16101-16110:16101-16110/udp"
    volumes:
      - ./server/logs:/app/logs
    depends_on:
      - database

  database:
    image: postgres:15-alpine
    container_name: ciklo-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: