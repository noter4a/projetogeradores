version: '3.8'

services:
  app:
    image: projetogeradores_app
    build: .
    container_name: ciklo-geradores
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

  api:
    build: 
      context: ./server
    container_name: ciklo-api
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - DB_HOST=database
      - NODE_ENV=production
    ports:
      - "127.0.0.1:5000:5000"
      # TCP<->MQTT bridge for serial-over-TCP modems (USR-G806s etc.).
      # Exposed on all interfaces so 4G modems can reach it. Must match TCP_BRIDGE_PORT in server/.env.
      - "8900:8900"
      # GNSS location reports from the modem (separate socket). Must match GNSS_BRIDGE_PORT in server/.env.
      - "8901:8901"
    volumes:
      - ./server/logs:/app/logs
    depends_on:
      - database

  database:
    image: postgres:15-alpine
    container_name: ciklo-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: